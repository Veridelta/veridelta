name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    name: Lint, Format, and Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv and Set up Python
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"

      - name: Install Dependencies
        run: uv sync --all-extras

      - name: Run Pre-commit Hooks
        run: uv run pre-commit run --all-files

  test-smoke:
    name: Smoke Tests
    needs: static-analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv and Set up Python
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"

      - name: Install Dependencies
        run: uv sync --all-extras

      - name: Execute Smoke Tests
        run: uv run pytest tests/smoke

  test-core:
    name: Core Engine (Py ${{ matrix.python-version }}, ${{ matrix.os }})
    needs: test-smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Continue running matrix jobs to identify all failing OS/Python combinations
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv and Set up Python
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: uv sync --all-extras

      - name: Execute Core Tests (Unit & Integration)
        run: uv run pytest tests/unit tests/integration --cov=src/veridelta --cov-report=xml

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  test-e2e:
    name: CLI End-to-End (${{ matrix.os }})
    needs: test-smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"] 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv and Set up Python
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: uv sync --all-extras

      - name: Execute E2E CLI Subprocess Tests
        run: uv run pytest tests/e2e