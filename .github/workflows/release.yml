name: Publish to PyPI

on:
  push:
    tags:
      - "v*" # Trigger only when Commitizen pushes a new version tag (e.g., v0.1.0)

jobs:
  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    
    environment:
      name: pypi
      url: https://pypi.org/project/veridelta/
      
    permissions:
      id-token: write 
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build Artifacts
        run: uv build

      - name: Publish to PyPI
        run: uv publish