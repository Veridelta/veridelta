site_name: Veridelta
site_description: Semantic diffing engine for mission-critical data pipelines.
site_author: Veridelta Maintainers
site_url: https://Veridelta.github.io/veridelta/
repo_url: https://github.com/Veridelta/veridelta
repo_name: Veridelta/veridelta

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocs-jupyter
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite

nav:
  - Home: index.md
  - Tutorials:
    - Quickstart: examples/quickstart.ipynb
    - Advanced Rules: examples/advanced_rules.ipynb
    - CI/CD Workflows: examples/yaml_config.ipynb
  - Configuration: configuration.md
  - API Reference: api.md
  - Roadmap: roadmap.md
